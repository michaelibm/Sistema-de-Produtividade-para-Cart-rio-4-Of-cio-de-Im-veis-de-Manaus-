version: '3.8'

services:
  # Banco de dados PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: cartorio-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cartorio_user
      POSTGRES_PASSWORD: cartorio_password_2024
      POSTGRES_DB: cartorio_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - cartorio-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cartorio_user -d cartorio_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cartorio-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://cartorio_user:cartorio_password_2024@postgres:5432/cartorio_db
      JWT_SECRET: seu_jwt_secret_super_seguro_aqui_2024
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cartorio-network
    volumes:
      - ./backend:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cartorio-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - cartorio-network
    environment:
      REACT_APP_API_URL: http://localhost:5000/api

networks:
  cartorio-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
